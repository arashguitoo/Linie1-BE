    --ok:#3f8f4f;

    --bad:#c0392b;

    --card:#ffffff;

  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;

  .wrap{max-width:680px;margin:0 auto;padding:16px 16px 64px}
  header.top{display:flex;align-items:center;gap:12px;padding:8px 0 16px}
  header.top .logo{width:42px;height:42px;border-radius:12px;background:var(--accent);

  header.top p{margin:0;font-size:.78rem;color:var(--ink-soft)}

    color:var(--accent-deep);font-weight:700;font-size:.9rem;padding:9px 14px;border-radius:999px;cursor:pointer}

  .overview .lead{color:var(--ink-soft);font-size:.92rem;margin:0 0 18px}
  .module-card{background:var(--card);border:1.5px solid var(--line);border-radius:18px;padding:16px;margin:0 0 14px;

  .module-card:active{transform:scale(.99)}
  .module-card.locked{opacity:.62;cursor:default}
  .module-card .num{flex:0 0 auto;width:44px;height:44px;border-radius:12px;background:var(--accent-soft);

  .module-card .body p{margin:0;font-size:.82rem;color:var(--ink-soft)}

  .module-card .status.s-lock{color:var(--ink-soft)}

  .task-head .count{font-size:.82rem;color:var(--ink-soft)}

  .opt.sel{border-color:var(--accent)}
  .opt.correct{border-color:var(--ok);background:var(--ok-bg)}
  .opt.wrong{border-color:var(--bad);background:var(--bad-bg)}

  .pair-row{display:flex;gap:8px;align-items:center}

  .order-item .ord-txt{flex:1}
  .order-item .ord-btns{display:flex;flex-direction:column;gap:3px}
  .order-item .ord-btns button{border:none;background:var(--accent-soft);color:var(--accent-deep);
    width:30px;height:20px;border-radius:6px;font-size:.7rem;cursor:pointer;line-height:1}
  .order-item .ord-btns button:disabled{opacity:.3;cursor:default}
  .feedback{margin-top:15px;padding:13px 15px;border-radius:12px;font-size:.93rem;display:none}
  .feedback.show{display:block}
  .feedback.ok{background:var(--ok-bg);color:#256b34}
  .feedback.bad{background:var(--bad-bg);color:#922}
  .feedback b{display:block;margin-bottom:3px}
  .actions{margin-top:16px;display:flex;gap:10px}
  .btn{flex:1;border:none;border-radius:13px;padding:14px;font-size:1rem;font-weight:800;cursor:pointer;transition:.12s}
  .btn:active{transform:scale(.98)}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:disabled{background:#e9d4b6;cursor:default}
  .btn-ghost{background:#fff;border:2px solid var(--line);color:var(--accent-deep)}
  /* module end */
  .endscreen{text-align:center;padding:10px 4px}
  .endscreen .big{font-size:3rem;margin:6px 0}
  .endscreen h2{margin:.1em 0}
  .pw-reward{background:var(--accent);color:#fff;border-radius:16px;padding:18px;margin:18px 0;cursor:pointer;box-shadow:var(--shadow)}

  .namebox{margin:16px 0}
  .namebox input{width:100%;padding:13px 15px;border:2px solid var(--line);border-radius:12px;font-size:1rem;text-align:center}

  .lockscreen .lock-ic{font-size:2.6rem}
  .lockscreen input{width:100%;padding:14px;border:2px solid var(--line);border-radius:12px;font-size:1.05rem;
    text-align:center;margin:14px 0;font-family:ui-monospace,monospace;letter-spacing:.03em}
  .lockscreen .err{color:var(--bad);font-size:.85rem;min-height:18px}
  .cert-wrap{margin:14px 0}
  canvas{max-width:100%;border-radius:12px;box-shadow:var(--shadow)}
  .mini{font-size:.78rem;color:var(--ink-soft);text-align:center;margin-top:18px}
  .hidden{display:none!important}
</style>

<script>
/* ============ STATE & MECHANICS ============ */
const LEKTION_ID = 1;
const STORE_KEY = "linie1-beruf-l1";
const NAME_KEY = "lda-username";
const MODULES = [MODUL_1, MODUL_2, MODUL_3, MODUL_4];

let state = loadState();
let current = { modIndex:null, stack:[], pos:0, total:0, answered:false, lastCorrect:false, sel:null, pairState:null, orderState:null, scrambleState:null };

function loadState(){
  try{ return JSON.parse(localStorage.getItem(STORE_KEY)) || {done:{}}; }
  catch(e){ return {done:{}}; }
}
function saveState(){ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
function getName(){ return localStorage.getItem(NAME_KEY) || ""; }
function setName(n){ localStorage.setItem(NAME_KEY, n); }

const screen = document.getElementById('screen');
const backbar = document.getElementById('backbar');
const backbtn = document.getElementById('backbtn');
backbtn.onclick = ()=>{ renderOverview(); };

function moduleUnlocked(i){
  if(i===0) return true;
  return !!state.done[i-1]; // previous module finished
}

/* ============ OVERVIEW ============ */
function renderOverview(){
  backbar.classList.add('hidden');
  let html = '<div class="overview">';
  html += '<h2>Eine neue Stelle</h2>';
  html += '<p class="lead">Vier Module mit je 30 Aufgaben. Schließe ein Modul ab, um das Passwort fürs nächste zu bekommen — und lade dein Zertifikat herunter.</p>';
  MODULES.forEach((m,i)=>{
    const done = !!state.done[i];
    const unlocked = moduleUnlocked(i);
    let cls = 'module-card'; if(done) cls+=' done'; if(!unlocked) cls+=' locked';
    let status, sc;
    if(done){ status='✓ abgeschlossen'; sc='s-done'; }
    else if(unlocked){ status='offen — jetzt starten'; sc='s-open'; }
    else { status='🔒 gesperrt — Passwort nötig'; sc='s-lock'; }
    html += `<div class="${cls}" data-i="${i}">
      <div class="num">${done?'✓':(i+1)}</div>
      <div class="body">
        <h3>${m.title.replace('Modul '+(i+1)+' — ','')}</h3>
        <p>${m.subtitle}</p>
        <span class="status ${sc}">${status}</span>
      </div></div>`;
  });
  html += '</div>';
  screen.innerHTML = html;
  screen.querySelectorAll('.module-card').forEach(c=>{
    const i = +c.dataset.i;
    if(moduleUnlocked(i)) c.onclick = ()=> enterModule(i);
  });
}

/* ============ ENTER / UNLOCK ============ */
function enterModule(i){
  const m = MODULES[i];
  if(i>0 && !state.done[i-1]){ renderLock(i); return; }
  startModule(i);
}
function renderLock(i){
  const m = MODULES[i];
  backbar.classList.remove('hidden');
  screen.innerHTML = `<div class="lockscreen card">
    <div class="lock-ic">🔒</div>
    <h2>${m.title}</h2>
    <p>Gib das Passwort aus dem vorherigen Modul ein.</p>
    <input id="pwin" placeholder="z. B. M2-XXXX-2026" autocapitalize="characters" autocomplete="off">
    <div class="err" id="pwerr"></div>
    <button class="btn btn-primary" id="pwgo">Freischalten</button>
  </div>`;
  const go = ()=>{
    const v = document.getElementById('pwin').value.trim().toUpperCase();
    if(v === m.passwordToUnlock){ startModule(i); }
    else { document.getElementById('pwerr').textContent = 'Das Passwort stimmt nicht. Versuch es noch einmal.'; }
  };
  document.getElementById('pwgo').onclick = go;
  document.getElementById('pwin').addEventListener('keydown',e=>{ if(e.key==='Enter') go(); });
}

/* ============ START MODULE ============ */
function startModule(i){
  const m = MODULES[i];
  // build flat task stack, expanding reading followups
  let stack = [];
  m.tasks.forEach(t=>{
    if(t.type==='reading'){
      stack.push({type:'reading', title:t.title, text:t.text});
      (t.followsReading||[]).forEach(f=> stack.push(Object.assign({}, f, {_reading:t.title})));
    } else {
      stack.push(t);
    }
  });
  current = { modIndex:i, stack:stack, pos:0, total:stack.length, answered:false,
    lastCorrect:false, sel:null, pairState:null, orderState:null, scrambleState:null,
    reShown:{} };
  backbar.classList.remove('hidden');
  renderTask();
}

/* ============ RENDER TASK ============ */
function renderTask(){
  const c = current;
  if(c.pos >= c.stack.length){ renderModuleEnd(); return; }
  const t = c.stack[c.pos];
  c.answered=false; c.sel=null; c.pairState=null; c.orderState=null; c.scrambleState=null;
  const m = MODULES[c.modIndex];
  const doneCount = c.pos;
  const pct = Math.round((c.pos/c.total)*100);

  let html = `<div class="task-head"><span class="mod">${m.title}</span>
    <span class="count">${Math.min(c.pos+1,c.total)} / ${c.total}</span></div>
    <div class="bar"><i style="width:${pct}%"></i></div><div class="card">`;

  // reading text shown above the task if part of a reading group
  if(t.type==='reading'){
    html += `<div class="readbox"><div class="rt">📖 Lesetext</div><b>${t.title}</b><br>${t.text}</div>
      <p class="prompt">Lies den Text in Ruhe. Es folgen Fragen dazu.</p>`;
    html += `<div class="actions"><button class="btn btn-primary" id="readnext">Weiter zu den Fragen →</button></div></div>`;
    screen.innerHTML = html;
    document.getElementById('readnext').onclick = ()=>{ c.pos++; renderTask(); };
    return;
  }

  if(t._reading){
    const rt = findReadingText(t._reading);
    if(rt) html += `<div class="readbox"><div class="rt">📖 ${rt.title}</div>${rt.text}</div>`;
  }

  html += `<p class="prompt">${t.prompt||''}</p>`;
  html += renderBody(t);
  html += `<div class="feedback" id="fb"></div>`;
  html += `<div class="actions">
    <button class="btn btn-primary" id="checkbtn" disabled>Prüfen</button>
    <button class="btn btn-primary hidden" id="nextbtn">Weiter →</button></div></div>`;
  screen.innerHTML = html;
  wireBody(t);
  document.getElementById('checkbtn').onclick = ()=> checkAnswer(t);
  document.getElementById('nextbtn').onclick = ()=> goNext(t);
}

function findReadingText(title){
  const m = MODULES[current.modIndex];
  for(const t of m.tasks){ if(t.type==='reading' && t.title===title) return t; }
  return null;
}

/* ===== bodies per type ===== */
function renderBody(t){
  if(t.type==='mc'){
    return '<div class="opts">'+ t.options.map((o,i)=>`<button class="opt" data-i="${i}">${o}</button>`).join('') +'</div>';
  }
  if(t.type==='gap'){
    return '<div class="opts">'+ t.options.map((o,i)=>`<button class="opt" data-i="${i}">${o}</button>`).join('') +'</div>';
  }
  if(t.type==='pair'){
    const rights = shuffle(t.items.map((it,idx)=>({txt:it.r, idx})));
    current.pairState = { rights, chosen:{}, order:[], rightOrder:rights };
    let h = '<div class="pair-grid">';
    t.items.forEach((it,li)=>{
      h += `<div class="pair-row"><div class="pair-l">${it.l}</div><div class="pair-r-opts" data-li="${li}">`;
      rights.forEach((r)=>{ h += `<button class="pair-r" data-li="${li}" data-ri="${r.idx}">${r.txt}</button>`; });
      h += '</div></div>';
    });
    h += '</div>';
    return h;
  }
  if(t.type==='scramble'){
    const bank = shuffleSeeded(t.words.map((w,i)=>({w,i})), hashStr(t.answer));
    current.scrambleState = { picked:[], bank };
    let h = '<div class="tokens empty" id="toks"></div><div class="bank" id="bank">';
    bank.forEach((b,bi)=>{ h += `<button class="tok" data-bi="${bi}">${b.w}</button>`; });
    h += '</div>';
    return h;
  }
  if(t.type==='order'){
    const shuffled = shuffleSeeded(t.items.map((it,i)=>({it,i})), hashStr(t.items.join('|')));
    current.orderState = { order: shuffled.map(s=>s.i), items:t.items };
    return '<div class="order-list" id="orderlist"></div>';
  }
  return '';
}

function wireBody(t){
  if(t.type==='mc' || t.type==='gap'){
    screen.querySelectorAll('.opt').forEach(b=>{
      b.onclick = ()=>{
        if(current.answered) return;
        screen.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));
        b.classList.add('sel'); current.sel = +b.dataset.i;
        document.getElementById('checkbtn').disabled = false;
      };
    });
  }
  if(t.type==='pair'){
    screen.querySelectorAll('.pair-r').forEach(b=>{
      b.onclick = ()=>{
        if(current.answered) return;
        const li = +b.dataset.li, ri = +b.dataset.ri;
        const grp = screen.querySelector(`.pair-r-opts[data-li="${li}"]`);
        grp.querySelectorAll('.pair-r').forEach(x=>x.classList.remove('sel'));
        b.classList.add('sel');
        current.pairState.chosen[li] = ri;
        if(Object.keys(current.pairState.chosen).length === t.items.length){
          document.getElementById('checkbtn').disabled = false;
        }
      };
    });
  }
  if(t.type==='scramble'){ renderScramble(t); }
  if(t.type==='order'){ renderOrder(t); }
}

function renderScramble(t){
  const st = current.scrambleState;
  const toks = document.getElementById('toks');
  const bank = document.getElementById('bank');
  toks.innerHTML=''; 
  if(st.picked.length===0){ toks.classList.add('empty'); } else { toks.classList.remove('empty'); }
  st.picked.forEach((bi,pi)=>{
    const chip = document.createElement('button');
    chip.className='chip'; chip.textContent = st.bank[bi].w;
    chip.onclick = ()=>{ if(current.answered) return; st.picked.splice(pi,1); renderScramble(t); document.getElementById('checkbtn').disabled = st.picked.length===0; };
    toks.appendChild(chip);
  });
  bank.querySelectorAll('.tok').forEach(b=>{
    const bi = +b.dataset.bi;
    b.classList.toggle('used', st.picked.includes(bi));
    b.onclick = ()=>{ if(current.answered) return; if(st.picked.includes(bi)) return;
      st.picked.push(bi); renderScramble(t); document.getElementById('checkbtn').disabled = false; };
  });
}

function renderOrder(t){
  const st = current.orderState;
  const list = document.getElementById('orderlist');
  list.innerHTML='';
  st.order.forEach((origIdx,pos)=>{
    const row = document.createElement('div'); row.className='order-item';
    row.innerHTML = `<div class="ord-num">${pos+1}</div><div class="ord-txt">${st.items[origIdx]}</div>
      <div class="ord-btns">
        <button data-dir="-1" ${pos===0?'disabled':''}>▲</button>
        <button data-dir="1" ${pos===st.order.length-1?'disabled':''}>▼</button></div>`;
    row.querySelectorAll('button').forEach(btn=>{
      btn.onclick = ()=>{ if(current.answered) return;
        const dir = +btn.dataset.dir; const ni = pos+dir;
        if(ni<0||ni>=st.order.length) return;
        [st.order[pos],st.order[ni]]=[st.order[ni],st.order[pos]];
        renderOrder(t); };
    });
    list.appendChild(row);
  });
  document.getElementById('checkbtn').disabled = false; // order always answerable
}

/* ===== check answers ===== */
function checkAnswer(t){
  if(current.answered) return;
  let correct=false;
  if(t.type==='mc' || t.type==='gap'){
    correct = current.sel === t.correct;
    screen.querySelectorAll('.opt').forEach((b,i)=>{
      b.disabled=true;
      if(i===t.correct) b.classList.add('correct');
      else if(i===current.sel) b.classList.add('wrong');
    });
  }
  else if(t.type==='pair'){
    correct=true;
    t.items.forEach((it,li)=>{ if(current.pairState.chosen[li]!==li) correct=false; });
    screen.querySelectorAll('.pair-r').forEach(b=>{
      const li=+b.dataset.li, ri=+b.dataset.ri; b.disabled=true;
      if(current.pairState.chosen[li]===ri){ b.classList.add(ri===li?'correct':'wrong'); }
      if(ri===li){ b.classList.add('correct'); }
    });
  }
  else if(t.type==='scramble'){
    const built = current.scrambleState.picked.map(bi=>current.scrambleState.bank[bi].w).join(' ');
    correct = built === t.answer;
    showScrambleCheck(correct, t);
  }
  else if(t.type==='order'){
    correct = current.orderState.order.every((v,i)=> v===i);
    showOrderCheck(correct);
  }
  current.answered=true; current.lastCorrect=correct;
  const fb = document.getElementById('fb');
  fb.className = 'feedback show '+(correct?'ok':'bad');
  if(correct){
    fb.innerHTML = '<b>✓ Richtig!</b>'+(t.exp?('<span>'+t.exp+'</span>'):'');
  } else {
    let sol='';
    if(t.type==='scramble') sol = 'Lösung: '+t.answer;
    else if(t.type==='order') sol = 'Richtige Reihenfolge: '+current.orderState.items.join(' → ');
    else if(t.type==='mc'||t.type==='gap') sol = 'Richtig wäre: '+t.options[t.correct];
    else if(t.type==='pair') sol = 'Achte auf die richtigen Paare (grün).';
    fb.innerHTML = '<b>✗ Noch nicht.</b><span>'+sol+(t.exp?(' — '+t.exp):'')+'</span><br><span style="font-size:.8rem">Diese Aufgabe kommt am Ende noch einmal.</span>';
  }
  document.getElementById('checkbtn').classList.add('hidden');
  document.getElementById('nextbtn').classList.remove('hidden');
}

function showScrambleCheck(correct,t){
  screen.querySelectorAll('.tok').forEach(b=>b.style.pointerEvents='none');
  screen.querySelectorAll('.chip').forEach(c=>{ c.style.pointerEvents='none';
    c.style.borderColor = correct?'var(--ok)':'var(--bad)'; c.style.background = correct?'var(--ok-bg)':'var(--bad-bg)'; });
}
function showOrderCheck(correct){
  screen.querySelectorAll('.order-item').forEach((row,pos)=>{
    row.querySelectorAll('button').forEach(b=>b.disabled=true);
    const ok = current.orderState.order[pos]===pos;
    row.style.borderColor = ok?'var(--ok)':'var(--bad)';
    row.style.background = ok?'var(--ok-bg)':'var(--bad-bg)';
  });
}

/* ===== advance / endless stack ===== */
function goNext(t){
  if(!current.lastCorrect){
    // re-queue this task at the end (endless stack)
    current.stack.push(t);
    current.total = current.stack.length;
  }
  current.pos++;
  renderTask();
}

/* ============ MODULE END ============ */
function renderModuleEnd(){
  const i = current.modIndex;
  const m = MODULES[i];
  state.done[i] = true; saveState();
  if(typeof window.goatcounter !== 'undefined'){
    try{ window.goatcounter.count({path:'l'+LEKTION_ID+'-modul'+(i+1)+'-completed', title:'L1 Modul '+(i+1)+' completed', event:true}); }catch(e){}
  }
  const isLast = (i === MODULES.length-1);
  const savedName = getName();
  let html = `<div class="endscreen card">
    <div class="big">🎉</div>
    <h2>${m.title} geschafft!</h2>
    <p>Du hast alle Aufgaben dieses Moduls richtig gelöst.</p>`;

  // name + certificate
  html += `<div class="namebox">
      <input id="nameinput" placeholder="Dein Name für das Zertifikat" value="${savedName.replace(/"/g,'&quot;')}">
    </div>
    <div class="cert-wrap"><canvas id="cert" width="900" height="620"></canvas></div>
    <div class="actions">
      <button class="btn btn-ghost" id="dlcert">Zertifikat herunterladen</button>
    </div>`;

  if(!isLast){
    html += `<div class="pw-reward" id="pwreward">
      <div class="lab">🎁 Passwort für ${MODULES[i+1].title.replace(/ —.*/,'')}</div>
      <div class="code">${m.passwordReward}</div>
      <div class="hint">Tippen zum Kopieren — du brauchst es, um das nächste Modul zu öffnen.</div>
    </div>
    <div class="actions">
      <button class="btn btn-primary" id="nextmod">Weiter zu ${MODULES[i+1].title.replace(/ —.*/,'')} →</button>
    </div>`;
  } else {
    html += `<div class="pw-reward" id="pwreward" style="background:var(--ok)">
      <div class="lab">🏆 Lektion 1 komplett!</div>
      <div class="code">LINIE1-L1-MEISTER</div>
      <div class="hint">Glückwunsch — du hast alle vier Module von „Eine neue Stelle" geschafft.</div>
    </div>
    <div class="actions">
      <button class="btn btn-primary" id="tooverview">Zurück zur Übersicht</button>
    </div>`;
  }
  html += `</div>`;
  screen.innerHTML = html;

  drawCertificate(savedName, m, isLast);
  document.getElementById('nameinput').addEventListener('input', e=>{
    setName(e.target.value); drawCertificate(e.target.value, m, isLast);
  });
  document.getElementById('dlcert').onclick = ()=>{
    const nm = document.getElementById('nameinput').value.trim() || 'Teilnehmer/in';
    setName(nm); drawCertificate(nm, m, isLast);
    const link = document.createElement('a');
    link.download = 'Zertifikat_Linie1_L1_Modul'+(i+1)+'.png';
    link.href = document.getElementById('cert').toDataURL('image/png');
    link.click();
  };
  const pr = document.getElementById('pwreward');
  if(pr && !isLast){ pr.onclick = ()=>{ navigator.clipboard && navigator.clipboard.writeText(m.passwordReward);
    pr.querySelector('.hint').textContent='✓ Kopiert!'; }; }
  if(document.getElementById('nextmod')) document.getElementById('nextmod').onclick = ()=> enterModule(i+1);
  if(document.getElementById('tooverview')) document.getElementById('tooverview').onclick = ()=> renderOverview();
}

/* ============ CERTIFICATE (canvas) ============ */
function drawCertificate(name, m, isLast){
  const cv = document.getElementById('cert'); if(!cv) return;
  const ctx = cv.getContext('2d'); const W=cv.width, H=cv.height;
  ctx.clearRect(0,0,W,H);
  // bg
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#fdf2e2'; ctx.fillRect(0,0,W,H);
  // border
  ctx.strokeStyle='#e8820c'; ctx.lineWidth=10; ctx.strokeRect(22,22,W-44,H-44);
  ctx.strokeStyle='#b5610a'; ctx.lineWidth=2; ctx.strokeRect(38,38,W-76,H-76);
  ctx.textAlign='center';
  ctx.fillStyle='#b5610a'; ctx.font='bold 26px Georgia,serif';
  ctx.fillText('LERN DEUTSCH MIT ARASH', W/2, 95);
  ctx.fillStyle='#2c2418'; ctx.font='bold 40px Georgia,serif';
  ctx.fillText('Zertifikat', W/2, 160);
  ctx.font='20px Georgia,serif'; ctx.fillStyle='#6b5d48';
  ctx.fillText('Linie 1 Beruf B1/B2 · Lektion 1 — Eine neue Stelle', W/2, 200);
  ctx.font='italic 18px Georgia,serif';
  ctx.fillText('Hiermit wird bestätigt, dass', W/2, 270);
  ctx.fillStyle='#e8820c'; ctx.font='bold 38px Georgia,serif';
  ctx.fillText(name||'Teilnehmer/in', W/2, 325);
  ctx.fillStyle='#2c2418'; ctx.font='19px Georgia,serif';
  const line = isLast ? 'alle vier Module der Lektion 1 erfolgreich abgeschlossen hat.'
                      : (m.title.replace(' — ',' — ')+' erfolgreich abgeschlossen hat.');
  wrapText(ctx, line, W/2, 380, W-160, 28);
  // seal
  ctx.beginPath(); ctx.arc(W/2, 480, 46, 0, Math.PI*2);
  ctx.fillStyle= isLast? '#3f8f4f':'#e8820c'; ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 30px Georgia,serif';
  ctx.fillText(isLast?'★':'✓', W/2, 492);
  ctx.fillStyle='#6b5d48'; ctx.font='15px Georgia,serif';
  const d = new Date();
  ctx.fillText('Kiel, '+d.toLocaleDateString('de-DE'), W/2, 560);
}
function wrapText(ctx, text, x, y, maxW, lh){
  const words = text.split(' '); let line=''; let yy=y;
  for(const w of words){
    const test = line+w+' ';
    if(ctx.measureText(test).width > maxW && line){ ctx.fillText(line.trim(),x,yy); line=w+' '; yy+=lh; }
    else line=test;
  }
  ctx.fillText(line.trim(),x,yy);
}

/* ============ utils ============ */
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function shuffleSeeded(a, seed){ a=a.slice(); let s=seed||1; const rnd=()=>{ s=(s*1103515245+12345)&0x7fffffff; return s/0x7fffffff; };
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(rnd()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function hashStr(str){ let h=5381; for(let i=0;i<str.length;i++){ h=((h<<5)+h)+str.charCodeAt(i); h=h&0x7fffffff; } return h||1; }

/* ============ boot ============ */
renderOverview();
